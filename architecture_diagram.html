<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ApplyGenius — System Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {

  color: #c8c8e8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}
h1 {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: #f0f0ff;
  margin-bottom: 6px;
  text-align: center;
}
.subtitle {
  font-size: 13px;
  color: #5a5a8a;
  margin-bottom: 40px;
  text-align: center;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.diagram {
  width: 100%;
  max-width: 960px;
  background: #0d0d1e;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 0 80px rgba(255,77,109,0.05), 0 20px 60px rgba(0,0,0,0.5);
}
svg {
  width: 100%;
  height: auto;
  overflow: visible;
}

</head>
<body>

<p class="subtitle">System Architecture · Autonomous Job Application Agent</p>

<div class="diagram">

  <!-- ===== ARROWS ===== -->
  <!-- Input → Parsers -->
  <line x1="175" y1="83" x2="222" y2="83" stroke="#ff4d6d" stroke-width="1.5" marker-end="url(#arrowAccent)" opacity="0.6"/>
